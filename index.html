<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:GRC</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/risk-matrix.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/splash.css">
  <link rel="stylesheet" href="css/modals-dashboard-v2.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash-container"></div>

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- SHELL -->
  <div class="shell">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="sidebar-container" style="display:flex;flex-direction:column;height:100%;"></div>
    </aside>

    <!-- MAIN PAGES -->
    <main>
      <div class="page active" id="page-dashboard"></div>
      <div class="page"        id="page-controls"></div>
      <div class="page"        id="page-risks"></div>
      <div class="page"        id="page-settings"></div>
    </main>

  </div>

  <!-- MODALS -->
  <div id="addc-container"></div>
  <div id="addr-container"></div>
  <div id="cdm-container"></div>
  <div id="rdm-container"></div>

  <!-- JS — loaded in dependency order -->
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/risks.js"></script>
  <script src="js/settings.js"></script>

  <script>

    async function loadPartial(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;
    }

    async function loadAllPartials() {
      await loadPartial('splash-container',  'components/splash.html');
      await loadPartial('header-container',  'components/header.html');
      await loadPartial('sidebar-container', 'components/sidebar.html');
      await loadPartial('page-dashboard',    'components/dashboard.html');
      await loadPartial('page-controls',     'components/controls.html');
      await loadPartial('page-risks',        'components/risks.html');
      await loadPartial('page-settings',     'components/settings.html');
      await loadPartial('addc-container',    'components/addc.html');
      await loadPartial('addr-container',    'components/addr.html');
      await loadPartial('cdm-container',     'components/cdm.html');
      await loadPartial('rdm-container',     'components/rdm.html');
    }

    loadAllPartials().then(() => {

      // Splash dismiss
      setTimeout(() => {
        const s = document.getElementById('splash-screen');
        if (s) {
          s.classList.add('splash-out');
          setTimeout(() => s.remove(), 900);
        }
      }, 2400);

      // App init — runs after all partials are in the DOM
      applyAllSettings();
      setDatePickerMin();
      renderControls();
      renderRisks();
      refreshDashboard();
      renderSettingsPage();

    });

  </script>

</body>
</html>
